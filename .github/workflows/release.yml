name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

defaults:
  run:
    shell: bash

env:
  APP_NAME: rgpre
  BIN_NAME: rgpre
  LIB_NAME: rgpre

jobs:
  build-release:
    name: Build release
    runs-on: ${{ matrix.os }}
    env:
      CARGO: cargo
      TARGET_FLAGS: ""
      TARGET_DIR: ./target
      RUST_BACKTRACE: 1
    strategy:
      matrix:
        include:
        - build: linux
          os: ubuntu-latest
          target: x86_64-unknown-linux-musl
          lib_file: librgpre.so
        - build: linux-arm
          os: ubuntu-latest
          target: arm-unknown-linux-gnueabihf
          lib_file: librgpre.so
        - build: macos
          os: macos-latest
          target: x86_64-apple-darwin
          lib_file: librgpre.dylib
        - build: macos-arm
          os: macos-latest
          target: aarch64-apple-darwin
          lib_file: librgpre.dylib
        - build: win-msvc
          os: windows-latest
          target: x86_64-pc-windows-msvc
          lib_file: rgpre.dll
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup target
        if: matrix.target != ''
        run: |
          echo "TARGET_FLAGS=--target ${{ matrix.target }}" >> $GITHUB_ENV
          echo "TARGET_DIR=./target/${{ matrix.target }}" >> $GITHUB_ENV

      - name: Setup Cross
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo install cross
          echo "CARGO=cross" >> $GITHUB_ENV

      - name: Build release binary
        run: ${{ env.CARGO }} build --release --verbose ${{ env.TARGET_FLAGS }}

      - name: Strip release binary (linux/macos)
        if: matrix.build == 'linux' || matrix.build == 'macos' || matrix.build == 'macos-arm'
        run: strip "${{ env.TARGET_DIR }}/release/${{ env.BIN_NAME }}"

      - name: Strip release binary (arm)
        if: matrix.build == 'linux-arm'
        run: |
          docker run --rm -v \
            "$PWD/target:/target:Z" \
            rustembedded/cross:arm-unknown-linux-gnueabihf \
            arm-linux-gnueabihf-strip \
            /target/arm-unknown-linux-gnueabihf/release/${{ env.BIN_NAME }}

      - name: Build archives
        run: |
          cli_staging="${{ env.APP_NAME }}-${{ matrix.target }}"
          lib_staging="lib${{ env.LIB_NAME }}-${{ matrix.target }}"
          mkdir -p "$cli_staging" "$lib_staging"

          if [[ "${{ matrix.os }}" = "windows-latest" ]]; then
            cp "${{ env.TARGET_DIR }}/release/${{ env.BIN_NAME }}.exe" "$cli_staging/"
            cp "${{ env.TARGET_DIR }}/release/${{ matrix.lib_file }}" "$lib_staging/"
            7z a "$cli_staging.zip" "$cli_staging"
            7z a "$lib_staging.zip" "$lib_staging"
            echo "CLI_ASSET=$cli_staging.zip" >> $GITHUB_ENV
            echo "LIB_ASSET=$lib_staging.zip" >> $GITHUB_ENV
          else
            cp "${{ env.TARGET_DIR }}/release/${{ env.BIN_NAME }}" "$cli_staging/"
            cp "${{ env.TARGET_DIR }}/release/${{ matrix.lib_file }}" "$lib_staging/"
            tar czf "$cli_staging.tar.gz" "$cli_staging"
            tar czf "$lib_staging.tar.gz" "$lib_staging"
            echo "CLI_ASSET=$cli_staging.tar.gz" >> $GITHUB_ENV
            echo "LIB_ASSET=$lib_staging.tar.gz" >> $GITHUB_ENV
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            ${{ env.CLI_ASSET }}
            ${{ env.LIB_ASSET }}

  publish-release:
    name: Publish release
    needs: ['build-release']
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lR artifacts/

      - name: Get release version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.VERSION }}
          body: ${{ steps.changelog.outputs.content }}
          files: artifacts/*
